# Daily GoldForecaster pipeline → Telegram at 07:00 Asia/Ho_Chi_Minh (00:00 UTC).
# Manual test: Actions → Daily Gold Forecast → Run workflow

name: Daily Gold Forecast

on:
  schedule:
    # 07:00 Vietnam (UTC+7) = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: daily-gold-forecast
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-daily-job:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright (Reuters/Bloomberg scrapers)
        run: playwright install --with-deps chromium

      - name: Run daily job
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLEAR_STALE_ARTICLES_ON_SUMMARIZE: "true"
          DATABASE_PATH: data/goldforecaster.db
          PYTHONUNBUFFERED: "1"
        run: python main.py --run-daily-job
